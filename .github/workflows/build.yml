# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: CI

on:
  push: ~

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          # Note: Use quotes to avoid float cast - especially important if the
          # version number ends with 0!
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Clone repo
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        # Required to build lxml from source on Python 3.14, which has no wheel yet.
        # lxml is a transitive dependency via autohooks -> pontos -> lxml.
        # Remove this step once lxml publishes a 3.14 wheel or is dropped from the chain.
        run: sudo apt-get install -y libxml2-dev libxslt1-dev
      - name: Install dependencies
        run: uv sync --group ci
      - name: Run tests
        run: uv run pytest

  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install system dependencies
        # Required to build lxml from source on Python 3.14, which has no wheel yet.
        # lxml is a transitive dependency via autohooks -> pontos -> lxml.
        # Remove this step once lxml publishes a 3.14 wheel or is dropped from the chain.
        run: sudo apt-get install -y libxml2-dev libxslt1-dev
      - name: Install dependencies
        run: uv sync --group ci
      - name: Type checking
        run: uv run mypy src test

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install system dependencies
        # Required to build lxml from source on Python 3.14, which has no wheel yet.
        # lxml is a transitive dependency via autohooks -> pontos -> lxml.
        # Remove this step once lxml publishes a 3.14 wheel or is dropped from the chain.
        run: sudo apt-get install -y libxml2-dev libxslt1-dev
      - name: Install dependencies
        run: uv sync --group ci
      - name: Check docs build
        run: |
          cd docs
          mkdir -p _static
          uv run make html
